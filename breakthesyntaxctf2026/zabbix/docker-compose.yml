services:
  zabbix-db:
    build: ./challenge
    image: zabbix-db-bts
    environment:
      MYSQL_ROOT_PASSWORD: qMwRD1234
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: qMwRD1234
    command: ["--default-authentication-plugin=mysql_native_password"]
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-6.0.0
    depends_on:
      - zabbix-db
    environment:
      DB_SERVER_HOST: zabbix-db
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: qMwRD1234
      MYSQL_DATABASE: zabbix
      MYSQL_ROOT_PASSWORD: qMwRD1234
    ports:
      - "10051:10051"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  zabbix-frontend:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-6.0.0
    depends_on:
      - zabbix-server
      - zabbix-db
    environment:
      DB_SERVER_HOST: zabbix-db
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: qMwRD1234
      MYSQL_DATABASE: zabbix
      MYSQL_ROOT_PASSWORD: qMwRD1234
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: "Europe/Warsaw"
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
