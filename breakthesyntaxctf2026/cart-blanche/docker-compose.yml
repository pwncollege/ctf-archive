services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "d!gL4HXDjR1NTPRC9N@drlmE"
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: "7I9#48c3gWvc7lR@pg4KcW4G"
    volumes:
      - ./dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
      - db_data:/var/lib/mysql

  web:
    build: .
    restart: always
    ports:
      - "8080:80"
    depends_on:
