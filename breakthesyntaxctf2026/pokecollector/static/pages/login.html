<div class="auth-container">
    <h2>Trainer Login</h2>
    <div class="auth-form">
        <input type="text" id="login-user" placeholder="Username" required>
        <input type="password" id="login-pass" placeholder="Password" required>
        <button onclick="handleLogin()" class="btn-auth">Login</button>
        <p class="auth-link" onclick="navigateTo('register')">New trainer? Register here</p>
    </div>
</div>
