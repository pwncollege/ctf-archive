services:
  pokecollector:
    build: .
    container_name: pokecollector
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ./env:/app/.env
      # The app reads the flag from /flag. The image ships a default test flag;
      # mount the real flag here at deploy time:
      # - ./flag:/flag:ro
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - APP_PORT=${APP_PORT:-8000}
