name: w
services:
  # Single container running both the web app (:8000) and the admin bot (:3000,
  # internal). server.js forwards accepted publishes to the bot, which visits the
  # post in a headless Chromium and types the flag into the admin Notes textarea.
  w:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLAG_FILE=/flag
    # The flag is read from /flag inside the container. The Dockerfile writes a
    # self-contained build-time default; replace it on deploy, e.g.:
    #   volumes:
    #     - ./flag:/flag:ro
