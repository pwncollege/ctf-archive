services:
  nginx:
    build: ./nginx
    depends_on:
      - backend
    networks:
      - cweb-net

  cache_proxy:
    build: ./cache_proxy
    ports:
      - "5555:5555"
    environment:
      - BACKEND_HOST=nginx
      - BACKEND_PORT=80
      - LISTEN_PORT=5555
    depends_on:
      - nginx
    networks:
      - cweb-net

  backend:
    build: ./backend
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=5001
      - DB_PATH=sqlite:///buildingblocks.db
      - SECRET_KEY=test-key
      - DEBUG_MODE=False
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=test-password
      - FLAG=UMASS{test-flag}
    networks:
      - cweb-net

  admin:
    build: ./admin
    environment:
      - BACKEND_URL=http://backend:5001
    depends_on:
      - backend
    networks:
      - cweb-net

  bot:
    build: ./bot
    platform: linux/amd64
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=test-password
      - BACKEND_URL=http://cache_proxy:5555
      - BOT_PORT=3001
    depends_on:
      - backend
    networks:
      - cweb-net

networks:
  cweb-net:
    driver: bridge
