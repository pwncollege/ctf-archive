<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Metrics — The Block City Times')}"></head>
<body>
<div class="page">

  <header th:replace="~{fragments/layout :: masthead('Editorial Administration Dashboard')}"></header>
  <div th:replace="~{fragments/layout :: ticker('STATS: ', ${ticker})}"></div>

  <main class="admin-wrap">

    <div class="admin-header">
      <h1>Readership Metrics</h1>
      <span class="env-badge" th:text="${activeConfig}">config</span>
    </div>

    <div style="display:flex; gap:1.5rem; flex-wrap:wrap; margin-bottom:2rem;">
      <div style="flex:1; min-width:12rem; background:#f5f5f5; border-left:4px solid #333; padding:1rem 1.25rem;">
        <div style="font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; color:#666;">Avg. Views / Day (14 d)</div>
        <div style="font-size:2rem; font-weight:bold; margin-top:.25rem;"
             th:text="${#numbers.formatDecimal(averagePerDay, 1, 0)}">0</div>
      </div>
      <div style="flex:1; min-width:12rem; background:#f5f5f5; border-left:4px solid #333; padding:1rem 1.25rem;">
        <div style="font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; color:#666;">Total Article Views</div>
        <div style="font-size:2rem; font-weight:bold; margin-top:.25rem;"
             th:text="${#numbers.formatInteger(totalViews, 1, 'COMMA')}">0</div>
      </div>
    </div>

    <h3>Daily Views — Last 14 Days</h3>
    <table class="config-table" style="margin-bottom:2rem;">
      <thead>
        <tr><th>Date</th><th style="text-align:right;">Views</th></tr>
      </thead>
      <tbody>
        <tr th:each="stat : ${dailyStats}">
          <td th:text="${#temporals.format(stat.date(), 'EEE, MMM d')}">date</td>
          <td style="text-align:right; font-variant-numeric:tabular-nums;"
              th:text="${#numbers.formatInteger(stat.views(), 1, 'COMMA')}">0</td>
        </tr>
      </tbody>
    </table>

    <h3>Views by Article</h3>
    <table class="config-table" style="margin-bottom:2rem;">
      <thead>
        <tr><th>Article</th><th style="text-align:right;">Views</th></tr>
      </thead>
      <tbody>
        <tr th:each="entry : ${articleViews}">
          <td>
            <a th:href="@{/article/{id}(id=${entry.key})}"
               th:text="${articles[entry.key] != null ? articles[entry.key].headline : entry.key}">title</a>
          </td>
          <td style="text-align:right; font-variant-numeric:tabular-nums;"
              th:text="${#numbers.formatInteger(entry.value, 1, 'COMMA')}">0</td>
        </tr>
      </tbody>
    </table>

    <div class="admin-nav">
      <a href="/admin">&#8592; Back to Dashboard</a> &nbsp;|&nbsp;
      <a href="/api/metrics">JSON API (/api/metrics)</a> &nbsp;|&nbsp;
      <a href="/logout">Logout (<span sec:authentication="name">user</span>)</a>
    </div>

  </main>
</div>
</body>
</html>
