services:

  app:
    build: .
    ports:
      - "${PORT:-5000}:8080"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changed_on_remote}
      APP_OUTBOUND_EDITORIAL_URL: "http://editorial:9000/submissions"
    networks:
      web: {}
      editorial-net:
        aliases:
          - app.internal
    depends_on:
      - editorial

  editorial:
    build: ./editorial
    environment:
      PORT: 9000
      APP_BASE_URL: "http://app.internal:8080"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changed_on_remote}
    networks:
      - editorial-net

  report-runner:
    build: ./developer
    environment:
      PORT: 9001
      BASE_URL: "http://app.internal:8080"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changed_on_remote}
    networks:
      web: {}
      editorial-net:
        aliases:
          - report-runner
    depends_on:
      - app

networks:
  web:
    driver: bridge
  editorial-net:
    driver: bridge
    internal: true
