<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Login — The Block City Times')}"></head>
<body>
<div class="page">

  <header th:replace="~{fragments/layout :: masthead('Editorial Administration Portal')}"></header>

  <main class="content">
    <div class="login-wrap">
      <h2>Admin Login</h2>

      <div th:if="${param.error}"  class="alert alert-error">Invalid username or password.</div>
      <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>

      <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
    </div>
  </main>

  <footer th:replace="~{fragments/layout :: footer('← Return to front page')}"></footer>

</div>
</body>
</html>
